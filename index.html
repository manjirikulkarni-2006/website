<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Baba ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Enhanced background with overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("image_bg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(0.85) saturate(1.2);
            z-index: -2;
        }

        /* Romantic color overlay */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(190, 22, 59, 0.15) 0%, rgba(0, 0, 0, 0.3) 90%);
            z-index: -1;
        }

        /* Floating hearts animation */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .heart1 { top: 15%; left: 10%; animation-delay: 0s; }
        .heart2 { top: 25%; right: 12%; animation-delay: 1s; }
        .heart3 { bottom: 20%; left: 15%; animation-delay: 2s; }
        .heart4 { bottom: 30%; right: 18%; animation-delay: 3s; }
        .heart5 { top: 45%; left: 50%; animation-delay: 2.5s; }

        /* Main heading container */
        .heading {
            text-align: center;
            margin-top: 15vh;
            position: relative;
            z-index: 5;
            animation: fadeInDown 1.2s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heading h1 {
            color: #fff;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            text-shadow: 2px 2px 15px rgba(190, 22, 59, 0.8),
                         0 0 30px rgba(255, 200, 220, 0.5),
                         0 0 50px rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .heading h1 span {
            display: inline-block;
            animation: pulse 3s infinite;
            color: #ffd7e0;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px #ff4d6d; }
            50% { text-shadow: 0 0 40px #ff9eb5, 0 0 60px #ff4d6d; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: rgba(190, 22, 59, 0.25);
            backdrop-filter: blur(5px);
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 20px;
            animation: fadeIn 2s ease 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Decorative elements */
        .decor-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff99b4, #ff4d6d, #ff99b4, transparent);
            margin: 30px auto;
            border-radius: 2px;
        }

        /* Glass card container for video (commented but styled) */
        .glass-card {
            width: 90%;
            max-width: 550px;
            height: 250px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 200, 220, 0.3) inset,
                        0 0 40px rgba(190, 22, 59, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 4;
            margin: 20px 0;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            animation: fadeInUp 1.2s ease 0.2s both;
        }

        .glass-card:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 35px 55px -10px #260e1a, 0 0 0 2px #ffc1d0 inset, 0 0 60px #ff6b93;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #wish_box {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #video2 {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
        }

        /* Optional overlay text on video */
        .video-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .glass-card:hover .video-overlay {
            opacity: 1;
        }

        /* Button container */
        #next_page {
            margin-bottom: 12vh;
            position: relative;
            z-index: 10;
            animation: fadeInUp 1.2s ease 0.4s both;
        }

        /* Stunning button */
        #button1 {
            padding: 18px 50px;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 3px;
            border-radius: 60px;
            background: linear-gradient(145deg, #be163b, #8a0f2a, #d41f4a);
            background-size: 200% 200%;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px #2a0b14,
                        0 0 30px #ff6b93,
                        0 4px 0 #4f0b1f;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: buttonGlow 3s infinite alternate;
        }

        @keyframes buttonGlow {
            0% { box-shadow: 0 20px 30px -8px #2a0b14, 0 0 30px #ff6b93, 0 4px 0 #4f0b1f; }
            100% { box-shadow: 0 25px 40px -6px #3f1020, 0 0 55px #ff9eb5, 0 6px 0 #6f122b; }
        }

        #button1::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.7s;
        }

        #button1:hover {
            transform: scale(1.08) translateY(-5px);
            background: linear-gradient(145deg, #d41f4a, #be163b, #ff4d6d);
            box-shadow: 0 30px 45px -8px #3f1020, 0 0 60px #ffb0c3, 0 6px 0 #7a1533;
        }

        #button1:hover::before {
            left: 100%;
        }

        #button1:active {
            transform: scale(0.98) translateY(4px);
            box-shadow: 0 10px 20px #1f0810;
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 0 15px #ffd0dc, 0 0 30px #ffb0c0;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }

        .sparkle1 { top: 30%; left: 20%; animation-delay: 0s; }
        .sparkle2 { top: 60%; right: 15%; animation-delay: 1s; }
        .sparkle3 { bottom: 25%; left: 70%; animation-delay: 2s; }
        .sparkle4 { bottom: 45%; right: 40%; animation-delay: 1.5s; }

        /* Responsive */
        @media (max-width: 600px) {
            .heading {
                margin-top: 10vh;
            }

            .heading h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.9rem;
                letter-spacing: 4px;
                padding: 8px 20px;
            }

            .glass-card {
                height: 200px;
                border-radius: 25px;
            }

            #button1 {
                padding: 14px 35px;
                font-size: 1.3rem;
            }

            #next_page {
                margin-bottom: 8vh;
            }

            .floating-heart {
                font-size: 20px;
            }
        }

        @media (max-width: 380px) {
            .heading h1 {
                font-size: 2rem;
            }

            .glass-card {
                height: 160px;
            }
        }

        /* Loading animation for button (optional) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Floating hearts for romance -->
    <div class="floating-heart heart1">❤️</div>
    <div class="floating-heart heart2">❤️</div>
    <div class="floating-heart heart3">❤️</div>
    <div class="floating-heart heart4">❤️</div>
    <div class="floating-heart heart5">❤️</div>

    <!-- Sparkle points -->
    <div class="sparkle sparkle1"></div>
    <div class="sparkle sparkle2"></div>
    <div class="sparkle sparkle3"></div>
    <div class="sparkle sparkle4"></div>

    <!-- Main Heading with style -->
    <div class="heading">
        <h1>
            WELCOME <br> 
            <span>BABA</span>
        </h1>
        <div class="decor-line"></div>
        <div class="subtitle">
            ✨ A SPECIAL SURPRISE AWAITS ✨
        </div>
    </div>

    <!-- Glass card for video (commented out as per your code, but styled and ready) 
    <div class="glass-card">
        <div id="wish_box">
            <video id="video2" src="bg_video.mp4" autoplay muted loop></video>
            <div class="video-overlay">❤️ preview ❤️</div>
        </div>
    </div> -->

    <!-- Next page button with enhanced interaction -->
    <div id="next_page">
        <button id="button1">CLICK ME</button>
    </div>

    <script>
        let b1 = document.getElementById("button1");
        
        // Add ripple effect on click
        b1.addEventListener("click", function(e) {
            // Create ripple element
            const ripple = document.createElement("span");
            ripple.classList.add("ripple");
            
            // Get click coordinates relative to button
            const rect = b1.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + "px";
            ripple.style.left = e.clientX - rect.left - size/2 + "px";
            ripple.style.top = e.clientY - rect.top - size/2 + "px";
            
            // Add ripple to button
            b1.appendChild(ripple);
            
            // Remove ripple after animation
            setTimeout(() => {
                ripple.remove();
            }, 600);
            
            // Navigate to next page (with slight delay to show ripple)
            setTimeout(() => {
                window.location.href = "video_page.html";
            }, 150);
        });

        // Add hover sound effect idea (can't autoplay sound without interaction)
        // Just visual delight for now

        // Optional: Add mouse move parallax effect to hearts
        document.addEventListener('mousemove', (e) => {
            const hearts = document.querySelectorAll('.floating-heart');
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            hearts.forEach((heart, index) => {
                const speed = 20 + (index * 5);
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                heart.style.transform = `translate(${x}px, ${y}px) rotate(${x * 0.5}deg)`;
            });
        });

        // Add fade-in effect for everything
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
        });
    </script>

    <!-- Hidden note -->
    <div style="position: fixed; bottom: 5px; right: 10px; color: rgba(255,255,255,0.2); font-size: 10px; z-index: 0;">
        ✨ with love ✨
    </div>
</body>
</html>
