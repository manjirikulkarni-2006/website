<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Surprise</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
}

/* Background video */
#bgvideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Main box */
#box1 {
    background: rgba(255,255,255,0.9);
    width: 90%;
    max-width: 500px;
    height: 50vh;
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

#box1:hover{
    transform: translateY(-5px);
}

#text{
    color:#333;
}

/* Video container */
#video_container{
    width: 90%;
    max-width: 500px;
    height: 50vh;
    margin-top:20px;
}

#video1,#video3 {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius:20px;
    display: none;
}

/* Gift button */
#gift {
    padding: 18px 45px;
    font-size: 24px;
    border-radius: 50px;
    margin: 30px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg,#ff6a88,#ff99ac);
    color: white;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
    display: none;
}

#gift:hover{
    transform: scale(1.1);
}

/* Mobile responsive */
@media (max-width:600px) {

    #box1{
        height: 40vh;
        font-size: 26px;
    }

    #video_container{
        height: 40vh;
    }

    #gift{
        padding: 15px 30px;
        font-size: 20px;
    }
}
</style>

</head>

<body>

<!-- Background Video -->
<video autoplay muted loop id="bgvideo">
    <source src="download.mp4" type="video/mp4">
</video>

<div id="box1">
    <h1 id="text">Click here</h1>
    <video id="video1" src="video.mp4"></video>
</div>

<div>
    <button id="gift">GIFT TIME</button>
</div>

<div id="video_container">
    <video id="video3" src=""></video>
</div>

<script src="video.js"></script>

</body>
</html>
