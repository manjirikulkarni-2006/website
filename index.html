<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

body{
    background-color: rgb(168, 213, 252);
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;

    min-height: 100vh;
    margin: 0;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.heading{
    font-size: 22px;
    text-align: center;
    font-family: 'Times New Roman', Times, serif;
}

/* Video Box */
#wish_box{
    width: 90%;
    max-width: 500px;
    height: 200px;
    background-color: rgb(221, 218, 213);
    border-radius: 10px;
    overflow: hidden;
}

/* Video */
#video2{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Button */
#button1{
    padding: 12px 25px;
    font-size: 20px;
    margin: 30px;
    border-radius: 8px;
}

/* 📱 Mobile Responsive */
@media (max-width:600px){

.heading h1{
    font-size: 24px;
}

#wish_box{
    height: 180px;
}

#button1{
    font-size: 18px;
    padding: 10px 20px;
}

}


</style>
</head>

<body>

<div class="heading">
<h1 style="color: rgb(38, 38, 94);">WELCOME BABA !!</h1>
</div>

<div id="wish_box">

    <video id="video2" src="bg_video.mp4" autoplay muted loop></video>
</div>
<div id="next_page">
    <button id="button1">CLICK ME</button>

</div>

<script src="main.js"></script>

</body>

</html>
