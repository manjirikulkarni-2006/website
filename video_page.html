<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Surprise</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
    font-family: 'Poppins', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
}

/* Background video */

#bgvideo{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Main Box */

#box1{
    position:relative;
    background:rgba(255,255,255,0.9);
    width:90%;
    max-width:500px;
    height:50vh;
    font-size:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    overflow:hidden;
    cursor:pointer;
}

/* Text */

#text{
    position:absolute;
    z-index:2;
}

/* First Video */

#video1{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;
    display:none;
}

/* Second Video Container */

#video_container{
    width:90%;
    max-width:500px;
    height:50vh;
    margin-top:20px;
}

/* Second Video */

#video3{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;
    display:none;
}

/* Gift Button */

#gift{
    padding:18px 45px;
    font-size:24px;
    border-radius:50px;
    margin:30px;
    border:none;
    cursor:pointer;
    background:linear-gradient(45deg,#ff6a88,#ff99ac);
    color:white;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    transition:0.3s;
    display:none;
}

#gift:hover{
    transform:scale(1.1);
}

/* Mobile */

@media (max-width:600px){

    #box1{
        height:40vh;
        font-size:26px;
    }

    #video_container{
        height:40vh;
    }

    #gift{
        padding:15px 30px;
        font-size:20px;
    }

}

</style>

</head>

<body>

<!-- Background Video -->
<video autoplay muted loop id="bgvideo">
    <source src="download.mp4" type="video/mp4">
</video>
<audio id="bgmusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Click Box -->

<div id="box1">

<h1 id="text">Click Here</h1>

<video id="video1">
<source src="video.mp4" type="video/mp4">
</video>

</div>

<!-- Gift Button -->

<button id="gift">GIFT TIME</button>

<!-- Second Video -->

<div id="video_container">

<video id="video3" controls>
<source src="gift.mp4" type="video/mp4">
</video>

</div>

<script src="video.js"></script>

</body>
</html>
