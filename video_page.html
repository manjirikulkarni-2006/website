<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
      body {
          background-color: rgb(226, 176, 157);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          margin: 0;
      }
      #box1 {
          background-color: aliceblue;
          width: 90%;
          max-width: 500px;
          height: 50vh;
          font-size: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          border-radius: 10px;
      }
        #video_container{
            width: 90%;
            max-width: 500px;
            height: 50vh;
        }

        #video1,#video3 {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #gift {
            padding: 20px 40px;
            font-size: 28px;
            border-radius: 20px;
            margin: 30px;
            display: none;
        }
        @media (max-width:600px) {
            #box1{
                height: 40vh;
                font-size: 28px;
            }
            #video_container{
                height: 40vh;
            }
            #gift{
                padding: 15px 30px;
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div id="box1">
        <h1 id="text">Click here </h1>
        <video id="video1" src="video.mp4"></video>
    </div>

    <div>
        <button id="gift">GIFT TIME </button>
    </div>
    <div id="video_container">
    <video id="video3" src=""></video>
    </div>

    <script src="video.js"></script>


</body>


</html>
