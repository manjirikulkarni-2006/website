<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ glow gift · cinematic reveal ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;   /* ← this guarantees vertical centering */
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0105;
      padding: 20px;
      position: relative;
    }

    /* dreamy background layer */
    .bg-video-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    #bgvideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.3) saturate(1.8) hue-rotate(300deg) blur(2px);
      transform: scale(1.05);
    }

    .glow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255, 120, 160, 0.3) 0%, rgba(5, 0, 3, 0.9) 90%);
      z-index: -1;
      pointer-events: none;
    }

    /* floating orbs */
    .orb {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #ffb0ca, #ff4177);
      filter: blur(90px);
      opacity: 0.2;
      top: -100px;
      right: -100px;
      z-index: -1;
      animation: float1 24s infinite alternate ease-in-out;
    }

    .orb2 {
      bottom: -120px;
      left: -80px;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle at 30% 70%, #d68eff, #c44a7a);
      filter: blur(110px);
      opacity: 0.18;
      animation: float2 26s infinite alternate;
    }

    @keyframes float1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 50px) scale(1.4); }
    }
    @keyframes float2 {
      0% { transform: translate(0, 0) scale(1.2); }
      100% { transform: translate(-70px, -30px) scale(1); }
    }

    /* ---------- main card – absolutely centered (horiz + vert) ---------- */
    #box1 {
      position: relative;
      width: 90%;
      max-width: 820px;
      height: 58vh;
      max-height: 520px;
      border-radius: 56px 56px 44px 44px;
      background: rgba(10, 5, 8, 0.15);
      backdrop-filter: blur(20px) brightness(0.95);
      box-shadow: 0 40px 70px -15px #2c0e1d,
                  0 0 0 2px rgba(255, 200, 225, 0.6) inset,
                  0 0 70px #ff8eb0b3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: box-shadow 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3), transform 0.3s ease;
      border: 1px solid rgba(255, 245, 250, 0.3);
      /* remove any auto margins, rely on flex container */
      margin: 0;                 /* was margin: 0 auto – not needed because body flex already centers */
    }

    #box1.has-video {
      box-shadow: 0 0 0 3px #ffe2f0, 0 0 100px #ff9ec7;
    }

    /* video player – covers full card */
    #playerVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: none;
      z-index: 10;
      box-shadow: inset 0 0 40px #ffb0c6;
    }

    /* ---------- GLOW BUTTON (gift time) inside the card ---------- */
    #glowGiftBtn {
      position: relative;
      z-index: 20;
      padding: 1.4rem 4rem;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 6px;
      background: linear-gradient(145deg, #ff8aae, #ff3f6c, #c45cff);
      background-size: 220% 220%;
      border: none;
      border-radius: 140px;
      color: white;
      text-shadow: 0 3px 15px #57002d;
      box-shadow: 0 30px 50px -12px #ba2552, 0 0 70px #ffb7cf, 0 8px 0 #852845;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.9);
      transition: 0.25s ease-out;
      animation: pulseGlow 2.2s infinite alternate;
      backdrop-filter: blur(12px);
      white-space: nowrap;
      transform: scale(1);
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 30px 55px -12px #ff527b, 0 0 60px #ffb3cb, 0 8px 0 #852845; }
      100% { box-shadow: 0 45px 75px -6px #ff2a5c, 0 0 110px #ffe0ec, 0 10px 0 #631f39; }
    }

    #glowGiftBtn:hover {
      transform: scale(1.08) translateY(-4px);
      background: linear-gradient(145deg, #ffc0d5, #ff618b, #dc8eff);
      box-shadow: 0 45px 75px -8px #ff3465, 0 0 130px #fff0f7, 0 10px 0 #631f39;
    }

    #glowGiftBtn:active {
      transform: scale(0.96) translateY(6px);
      box-shadow: 0 15px 30px #9f2a4e, 0 0 80px #ffb0c6;
    }

    /* when video is active, button hidden */
    #box1.video-active #glowGiftBtn {
      display: none;
    }

    /* footnote — fixed bottom */
    .foot-note {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 225, 240, 0.5);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 4px;
      backdrop-filter: blur(4px);
      padding: 6px 22px;
      border-radius: 60px;
      z-index: 200;
      white-space: nowrap;
      background: rgba(10, 1, 6, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* responsive */
    @media (max-width: 650px) {
      #box1 {
        height: 44vh;
        max-height: 380px;
        border-radius: 42px;
      }

      #glowGiftBtn {
        padding: 1rem 2.5rem;
        font-size: 1.6rem;
        letter-spacing: 4px;
      }
      
      .foot-note {
        bottom: 25px;
        font-size: 0.8rem;
        letter-spacing: 3px;
      }
    }

    @media (max-height: 700px) {
      #box1 {
        height: 38vh;
      }
      #glowGiftBtn {
        padding: 0.8rem 2rem;
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <!-- background video -->
  <div class="bg-video-wrapper">
    <video autoplay muted loop id="bgvideo">
      <source src="download.mp4" type="video/mp4">
    </video>
  </div>
  <div class="glow-overlay"></div>
  <div class="orb"></div>
  <div class="orb2"></div>

  <!-- main card – now perfectly centered (flex container does the job) -->
  <div id="box1">
    <!-- glow gift button -->
    <button id="glowGiftBtn">🎁  gift time  🎁</button>

    <!-- single video player -->
    <video id="playerVideo" playsinline controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- simple footnote -->
  <div class="foot-note">✨  click the glow button · surprise plays  ✨</div>

  <script>
    (function() {
      const box = document.getElementById('box1');
      const glowBtn = document.getElementById('glowGiftBtn');
      const player = document.getElementById('playerVideo');

      // initial: button visible, video hidden
      player.style.display = 'none';
      box.classList.remove('video-active');

      // click on glow button → hide button, show & play video
      glowBtn.addEventListener('click', function(e) {
        e.stopPropagation();

        // hide the gorgeous button
        glowBtn.style.display = 'none';

        // show video player
        player.style.display = 'block';
        box.classList.add('video-active');

        // play video with moderate volume
        player.volume = 0.5;
        player.play().catch(err => {
          console.log('autoplay prevented — showing controls', err);
          player.controls = true;   // fallback: user can press play
        });

        // extra glow on card
        box.style.transition = 'box-shadow 0.4s';
        box.style.boxShadow = '0 0 0 4px #ffe6f0, 0 0 100px #ff9ec7, 0 40px 70px -15px #2c0e1d';
      });

      // if video src fails, show message in console
      player.addEventListener('error', () => {
        console.log('🎬 please place video.mp4 in folder — or rename your gift video to video.mp4');
      });

    })();
  </script>

  <!-- 
    VIDEO SETUP:
    - background: download.mp4 (ambient)
    - main video: video.mp4  (your surprise clip)
    The box is now perfectly centered horizontally & vertically.
  -->
</body>
</html>
