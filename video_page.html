<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ cinevault · centered surprise ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0105;
      padding: 20px;
      position: relative;
    }

    /* ---------- enriched backdrop (dreamscape) ---------- */
    .bg-video-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    #bgvideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.3) saturate(1.8) hue-rotate(300deg) blur(2px);
      transform: scale(1.05);
    }

    .glow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255, 120, 160, 0.3) 0%, rgba(5, 0, 3, 0.9) 90%);
      z-index: -1;
      pointer-events: none;
    }

    /* floating gems */
    .gem {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #ffb0ca, #ff4177);
      filter: blur(90px);
      opacity: 0.2;
      top: -100px;
      right: -100px;
      z-index: -1;
      animation: drift1 24s infinite alternate ease-in-out;
    }

    .gem2 {
      bottom: -120px;
      left: -80px;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle at 30% 70%, #d68eff, #c44a7a);
      filter: blur(110px);
      opacity: 0.18;
      animation: drift2 26s infinite alternate;
    }

    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 50px) scale(1.4); }
    }
    @keyframes drift2 {
      0% { transform: translate(0, 0) scale(1.2); }
      100% { transform: translate(-70px, -30px) scale(1); }
    }

    /* ---------- main stage (card) — always perfectly centered ---------- */
    #box1 {
      position: relative;
      width: 90%;
      max-width: 820px;            /* wider for cinematic feel */
      height: 58vh;
      max-height: 520px;
      border-radius: 56px 56px 44px 44px;
      background: rgba(10, 5, 8, 0.15);
      backdrop-filter: blur(20px) brightness(0.95);
      box-shadow: 0 40px 70px -15px #2c0e1d,
                  0 0 0 2px rgba(255, 200, 225, 0.6) inset,
                  0 0 70px #ff8eb0b3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: box-shadow 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3), transform 0.3s ease;
      border: 1px solid rgba(255, 245, 250, 0.3);
      margin: 0 auto;              /* extra insurance for centering */
    }

    #box1:hover {
      box-shadow: 0 50px 90px -8px #ff4f7b, 0 0 0 3px #ffeef5 inset, 0 0 100px #ff96b9;
      transform: scale(1.01) translateY(-3px);
    }

    /* click headline — extra refined */
    #text {
      position: absolute;
      z-index: 15;
      color: #fff9fe;
      font-weight: 700;
      font-size: clamp(2.6rem, 13vw, 4.4rem);
      letter-spacing: 12px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 30px #ffc0d0, 0 0 70px #ff7ca3, 6px 8px 20px #2e0b1a;
      background: rgba(255, 225, 240, 0.12);
      backdrop-filter: blur(20px);
      padding: 0.8rem 3.2rem;
      border-radius: 180px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transform: rotate(-0.7deg);
      transition: 0.35s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #box1:hover #text {
      letter-spacing: 18px;
      background: rgba(255, 215, 235, 0.22);
      box-shadow: 0 0 80px #ff9fbf;
      border-color: rgba(255, 255, 255, 0.95);
      transform: scale(1.02) rotate(-0.3deg);
    }

    /* both videos sit in the same container, perfectly centered by default */
    #video1, #video3 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;           /* ensures full coverage without distortion */
      border-radius: inherit;
      display: none;
      z-index: 10;
      box-shadow: inset 0 0 40px #ffb0c6;
    }

    /* ---------- gift button — luxurious, fixed, always centered ---------- */
    #gift {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 60px;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff92b5, #ff3f6c, #c866ff);
      background-size: 250% 250%;
      border: none;
      border-radius: 140px;
      color: white;
      text-shadow: 0 3px 15px #57002d;
      box-shadow: 0 35px 50px -15px #ba2552, 0 0 60px #ffb7cf, 0 6px 0 #852845;
      cursor: pointer;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: 0.2s ease-out;
      animation: softPulse 2.8s infinite alternate;
      backdrop-filter: blur(10px);
      z-index: 200;
      white-space: nowrap;
    }

    @keyframes softPulse {
      0% { box-shadow: 0 35px 55px -12px #ff527b, 0 0 50px #ffb3cb, 0 6px 0 #852845; }
      100% { box-shadow: 0 45px 70px -8px #ff2a5c, 0 0 100px #ffe0ec, 0 8px 0 #631f39; }
    }

    #gift:hover {
      transform: translateX(-50%) scale(1.1) translateY(-5px);
      background: linear-gradient(135deg, #ffc4da, #ff6d93, #dc9eff);
      box-shadow: 0 45px 75px -8px #ff3465, 0 0 120px #fff0f7;
    }

    #gift:active {
      transform: translateX(-50%) scale(0.94) translateY(6px);
      box-shadow: 0 15px 25px #9f2a4e;
    }

    /* elegant footnote — fixed, centered */
    .foot-note {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 225, 240, 0.5);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 4px;
      backdrop-filter: blur(4px);
      padding: 6px 22px;
      border-radius: 60px;
      z-index: 200;
      white-space: nowrap;
      background: rgba(10, 1, 6, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* responsive luxury */
    @media (max-width: 650px) {
      #box1 {
        height: 44vh;
        max-height: 380px;
        border-radius: 42px;
      }

      #text {
        font-size: 2rem;
        padding: 0.5rem 2rem;
        letter-spacing: 7px;
      }

      #gift {
        padding: 16px 40px;
        font-size: 1.7rem;
        bottom: 75px;
      }
      
      .foot-note {
        bottom: 25px;
        font-size: 0.8rem;
        letter-spacing: 3px;
      }
    }

    /* short screens adaptation */
    @media (max-height: 700px) {
      #box1 {
        height: 38vh;
      }
      #gift {
        bottom: 60px;
        padding: 14px 35px;
        font-size: 1.5rem;
      }
      .foot-note {
        bottom: 20px;
      }
    }

    /* tall screens */
    @media (min-height: 950px) {
      #gift {
        bottom: 110px;
      }
    }
  </style>
</head>
<body>

  <!-- background video (enigmatic) -->
  <div class="bg-video-wrapper">
    <video autoplay muted loop id="bgvideo">
      <source src="download.mp4" type="video/mp4">
    </video>
  </div>
  <div class="glow-overlay"></div>
  <div class="gem"></div>
  <div class="gem2"></div>

  <!-- main clickable card — perfectly centered in flex container -->
  <div id="box1">
    <h1 id="text">💎  click  💎</h1>
    <video id="video1" playsinline loop>
      <source src="video.mp4" type="video/mp4">
    </video>
    <video id="video3" playsinline controls>
      <source src="gift.mp4" type="video/mp4">
    </video>
  </div>

  <!-- gift button (fixed, always centered) -->
  <button id="gift">🎁  open the vault  🎁</button>

  <!-- fixed note -->
  <div class="foot-note">✨  tap the card · then the gift  ✨</div>

  <script>
    (function() {
      const box = document.getElementById('box1');
      const video1 = document.getElementById('video1');
      const video3 = document.getElementById('video3');
      const text = document.getElementById('text');
      const giftBtn = document.getElementById('gift');

      // ensure clean start: only text visible, videos hidden
      video1.style.display = 'none';
      video3.style.display = 'none';
      
      // (optional video load feedback)
      [video1, video3].forEach(v => {
        v.addEventListener('error', () => console.log('⏳ video asset will appear once available'));
      });

      // ---- STEP 1: click card ----
      box.addEventListener('click', function onClickCard(e) {
        // fade out text elegantly
        if (text) {
          text.style.transition = 'opacity 0.3s, visibility 0.3s';
          text.style.opacity = '0';
          setTimeout(() => {
            text.style.display = 'none';
          }, 250);
        }

        // show & play first video (video1) — centered automatically
        if (video1) {
          video1.style.display = 'block';
          video3.style.display = 'none';   // hide final if somehow visible
          video1.volume = 0.35;
          video1.play().catch(() => {
            video1.controls = true;        // fallback if autoplay denied
          });
        }

        // reveal gift button with fade
        if (giftBtn) {
          giftBtn.style.display = 'inline-block';
          giftBtn.style.opacity = '0';
          giftBtn.style.transition = 'opacity 0.6s';
          setTimeout(() => { giftBtn.style.opacity = '1'; }, 20);
        }

        // remove listener so it only triggers once
        box.removeEventListener('click', onClickCard);
      });

      // ---- STEP 2: gift button click ----
      giftBtn.addEventListener('click', function onGift() {
        // hide video1
        if (video1) {
          video1.pause();
          video1.style.display = 'none';
        }

        // show final video (gift.mp4) inside SAME container
        if (video3) {
          video3.style.display = 'block';
          video3.volume = 0.5;
          video3.play().catch(() => {
            video3.controls = true;        // graceful fallback
          });
        }

        // mark gift as opened
        giftBtn.textContent = '✨  unlocked  ✨';
        giftBtn.style.background = 'linear-gradient(135deg, #aa7f94, #754a60, #68457a)';
        giftBtn.style.boxShadow = '0 12px 28px #3b1a2a';
        giftBtn.style.transform = 'translateX(-50%) scale(0.96)';
        giftBtn.style.pointerEvents = 'none';
        giftBtn.style.animation = 'none';
        giftBtn.style.letterSpacing = '3px';
        giftBtn.style.filter = 'grayscale(0.3) brightness(0.9)';

        // extra glow on container
        box.style.boxShadow = '0 0 0 4px #ffe2f0, 0 0 100px #ff9ec7';
      });

      // tiny insurance: if someone double-clicks nothing breaks
    })();
  </script>

  <!-- 
    videos to place in same folder:
    - download.mp4   (background loop)
    - video.mp4      (first layer / teaser)
    - gift.mp4       (final surprise)
  -->
</body>
</html>
